<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Evaluación de Proveedores - ACCESS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f2f5f9;
padding:30px;
}

.container{

max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.15);

}

h1{

text-align:center;
color:#003b6d;
margin-bottom:10px;

}

h2{

margin-top:25px;
color:#003b6d;
border-bottom:2px solid #0b6efd;
padding-bottom:5px;

}

.row{

display:flex;
gap:15px;
margin-top:15px;
flex-wrap:wrap;

}

.col{

flex:1;
min-width:250px;

}

label{

display:block;
font-weight:600;
margin-bottom:5px;

}

input,select,textarea{

width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:8px;

}

textarea{

height:120px;
resize:none;

}

.question{

margin-top:20px;
padding:15px;
background:#f8f9fa;
border-radius:8px;

}

.rating{

display:flex;
justify-content:space-between;
margin-top:10px;

}

.rating label{

display:flex;
flex-direction:column;
align-items:center;
font-weight:normal;

}

canvas{

border:2px solid #333;
border-radius:8px;
width:100%;
height:220px;

}

button{

margin-top:30px;
width:100%;
padding:18px;
background:#0b6efd;
color:white;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;

}

button:hover{

background:#084298;

}

#resultado{

margin-top:25px;
padding:15px;
background:#eef4ff;
border-radius:10px;
font-size:20px;
font-weight:bold;
text-align:center;

}

</style>

</head>

<body>

<div class="container">

<h1>ACCESS</h1>

<h2>Registro Inspección Mensual - Evaluación de Proveedores</h2>

<div class="row">

<div class="col">

<label>Fecha Mantención</label>

<input type="date" id="fecha">

</div>

<div class="col">

<label>Proveedor</label>

<select id="proveedor">

<option>Seleccione...</option>

<option>Generadores ACCESS</option>
<option>SK Comercial</option>
<option>Cummins</option>
<option>Atlas Copco</option>
<option>Otro</option>

</select>

</div>

</div>

<div class="row">

<div class="col">

<label>Equipo / Maquinaria</label>

<input id="equipo">

</div>

<div class="col">

<label>Técnico Principal</label>

<input id="tecnico">

</div>

</div>

<div class="row">

<div class="col">

<label>Acompañante (Opcional)</label>

<input id="acompanante">

</div>

<div class="col">

<label>Evaluador</label>

<input id="evaluador">

</div>

</div>

<h2>Evaluación</h2>
<div class="question">

<label>P1: Puntualidad</label>
  <label>P2: uso de EPP</label>
  <label>P3: Disposicion</label>
  <label>P4: Orden y limpieza</label>
  <label>P5: Entrega de informe</label>
  <label>P6: Calidad general del servicio</label>

<label><input type="radio" name="p1" value="1">1</label>
<label><input type="radio" name="p2" value="2">2</label>
<label><input type="radio" name="p3" value="3">3</label>
<label><input type="radio" name="p4" value="4">4</label>
<label><input type="radio" name="p5" value="5">5</label>
<label><input type="radio" name="p6" value="6">6</label>
<label><input type="radio" name="p7" value="7">7</label>

</div>

</div>
<h2>Observaciones</h2>

<textarea id="observaciones"></textarea>

<h2>Firma del Evaluador</h2>

<canvas id="firma"></canvas>

<button onclick="limpiarFirma()">Limpiar Firma</button>

<div id="resultado">

Promedio: -

</div>

<button onclick="generarPDF()">

GUARDAR Y GENERAR PDF

</button>

</div>
