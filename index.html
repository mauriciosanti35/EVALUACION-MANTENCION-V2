<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación de Proveedores - ACCESS</title>
    
    <!-- Fuentes y Librerías Externas -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f2f5f9;
            padding: 30px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,.15);
        }

        h1 {
            text-align: center;
            color: #003b6d;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 25px;
            color: #003b6d;
            border-bottom: 2px solid #0b6efd;
            padding-bottom: 5px;
        }

        .row {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .col {
            flex: 1;
            min-width: 250px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        textarea {
            height: 120px;
            resize: none;
            margin-top: 10px;
        }

        .question {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #0b6efd;
        }

        .question-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .rating {
            display: flex;
            justify-content: space-between;
            max-width: 500px;
            margin-top: 10px;
        }

        .rating label {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }

        .rating input {
            width: auto;
            margin-bottom: 5px;
            cursor: pointer;
        }

        canvas {
            border: 2px solid #333;
            border-radius: 8px;
            width: 100%;
            height: 220px;
            margin-top: 10px;
            background-color: #fff;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 18px;
            background: #0b6efd;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #084298;
        }

        .btn-clear {
            background: #6c757d;
            padding: 10px;
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-clear:hover {
            background: #5a6268;
        }

        #resultado {
            margin-top: 25px;
            padding: 15px;
            background: #eef4ff;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            color: #003b6d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ACCESS</h1>
    <h2>Registro Inspección Mensual - Evaluación de Proveedores</h2>

    <!-- Datos de cabecera -->
    <div class="row">
        <div class="col">
            <label for="fecha">Fecha Mantención</label>
            <input type="date" id="fecha">
        </div>
        <div class="col">
            <label for="proveedor">Proveedor</label>
            <select id="proveedor">
                <option value="">Seleccione...</option>
                <option value="Generadores ACCESS">Generadores ACCESS</option>
                <option value="SK Comercial">SK Comercial</option>
                <option value="Cummins">Cummins</option>
                <option value="Atlas Copco">Atlas Copco</option>
                <option value="Otro">Otro</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <label for="equipo">Equipo / Maquinaria</label>
            <input type="text" id="equipo">
        </div>
        <div class="col">
            <label for="tecnico">Técnico Principal</label>
            <input type="text" id="tecnico">
        </div>
    </div>

    <div class="row">
        <div class="col">
            <label for="acompanante">Acompañante (Opcional)</label>
            <input type="text" id="acompanante">
        </div>
        <div class="col">
            <label for="evaluador">Evaluador</label>
            <input type="text" id="evaluador">
        </div>
    </div>

    <h2>Evaluación</h2>

    <!-- Cuestionario con escala 1 a 7 por ítem -->
    <div class="question">
        <div class="question-title">P1: Puntualidad</div>
        <div class="rating">
            <label><input type="radio" name="p1" value="1">1</label>
            <label><input type="radio" name="p1" value="2">2</label>
            <label><input type="radio" name="p1" value="3">3</label>
            <label><input type="radio" name="p1" value="4">4</label>
            <label><input type="radio" name="p1" value="5">5</label>
            <label><input type="radio" name="p1" value="6">6</label>
            <label><input type="radio" name="p1" value="7">7</label>
        </div>
    </div>

    <div class="question">
        <div class="question-title">P2: Uso de EPP</div>
        <div class="rating">
            <label><input type="radio" name="p2" value="1">1</label>
            <label><input type="radio" name="p2" value="2">2</label>
            <label><input type="radio" name="p2" value="3">3</label>
            <label><input type="radio" name="p2" value="4">4</label>
            <label><input type="radio" name="p2" value="5">5</label>
            <label><input type="radio" name="p2" value="6">6</label>
            <label><input type="radio" name="p2" value="7">7</label>
        </div>
    </div>

    <div class="question">
        <div class="question-title">P3: Disposición</div>
        <div class="rating">
            <label><input type="radio" name="p3" value="1">1</label>
            <label><input type="radio" name="p3" value="2">2</label>
            <label><input type="radio" name="p3" value="3">3</label>
            <label><input type="radio" name="p3" value="4">4</label>
            <label><input type="radio" name="p3" value="5">5</label>
            <label><input type="radio" name="p3" value="6">6</label>
            <label><input type="radio" name="p3" value="7">7</label>
        </div>
    </div>

    <div class="question">
        <div class="question-title">P4: Orden y limpieza</div>
        <div class="rating">
            <label><input type="radio" name="p4" value="1">1</label>
            <label><input type="radio" name="p4" value="2">2</label>
            <label><input type="radio" name="p4" value="3">3</label>
            <label><input type="radio" name="p4" value="4">4</label>
            <label><input type="radio" name="p4" value="5">5</label>
            <label><input type="radio" name="p4" value="6">6</label>
            <label><input type="radio" name="p4" value="7">7</label>
        </div>
    </div>

    <div class="question">
        <div class="question-title">P5: Entrega de informe</div>
        <div class="rating">
            <label><input type="radio" name="p5" value="1">1</label>
            <label><input type="radio" name="p5" value="2">2</label>
            <label><input type="radio" name="p5" value="3">3</label>
            <label><input type="radio" name="p5" value="4">4</label>
            <label><input type="radio" name="p5" value="5">5</label>
            <label><input type="radio" name="p5" value="6">6</label>
            <label><input type="radio" name="p5" value="7">7</label>
        </div>
    </div>

    <div class="question">
        <div class="question-title">P6: Calidad general del servicio</div>
        <div class="rating">
            <label><input type="radio" name="p6" value="1">1</label>
            <label><input type="radio" name="p6" value="2">2</label>
            <label><input type="radio" name="p6" value="3">3</label>
            <label><input type="radio" name="p6" value="4">4</label>
            <label><input type="radio" name="p6" value="5">5</label>
            <label><input type="radio" name="p6" value="6">6</label>
            <label><input type="radio" name="p6" value="7">7</label>
        </div>
    </div>

    <h2>Observaciones</h2>
    <textarea id="observaciones" placeholder="Escriba aquí comentarios adicionales..."></textarea>

    <h2>Firma del Evaluador</h2>
    <canvas id="firma"></canvas>
    <button type="button" class="btn-clear" onclick="limpiarFirma()">Limpiar Firma</button>

    <div id="resultado">
        Promedio: -
    </div>

    <button type="button" onclick="generarPDF()">
        GUARDAR Y GENERAR PDF
    </button>
</div>

<script>
    // 1. Configuración de SignaturePad para la firma digital
    const canvas = document.getElementById('firma');
    const signaturePad = new SignaturePad(canvas, {
        backgroundColor: 'rgba(255, 255, 255, 1)',
        penColor: 'rgb(0, 0, 0)'
    });

    // Ajustar resolución del área de dibujo
    function ajustarCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }
    
    window.addEventListener("resize", ajustarCanvas);
    ajustarCanvas();

    function limpiarFirma() {
        signaturePad.clear();
    }

    // 2. Controladores de eventos para calcular el promedio dinámico
    const radios = document.querySelectorAll('input[type="radio"]');
    radios.forEach(radio => {
        radio.addEventListener('change', calcularPromedio);
    });

    function calcularPromedio() {
        let suma = 0;
        let contadas = 0;
        
        for (let i = 1; i <= 6; i++) {
            const seleccionada = document.querySelector(`input[name="p${i}"]:checked`);
            if (seleccionada) {
                suma += parseInt(seleccionada.value);
                contadas++;
            }
        }

        const resultadoDiv = document.getElementById('resultado');
        if (contadas > 0) {
            const promedio = (suma / contadas).toFixed(1);
            resultadoDiv.innerText = `Promedio: ${promedio}`;
        } else {
            resultadoDiv.innerText = "Promedio: -";
        }
    }

    // 3. Generación estructurada del archivo PDF usando jsPDF
    function generarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        const fecha = document.getElementById('fecha').value || 'No especificada';
        const proveedor = document.getElementById('proveedor').value || 'No seleccionado';
        const equipo = document.getElementById('equipo').value || 'N/A';
        const tecnico = document.getElementById('tecnico').value || 'N/A';
        const evaluador = document.getElementById('evaluador').value || 'N/A';
        const observaciones = document.getElementById('observaciones').value || 'Sin observaciones adicionales.';

        // Título del Documento
        doc.setFont("Helvetica", "bold");
        doc.setFontSize(18);
        doc.text("ACCESS - Registro de Inspección Mensual", 14, 20);
        
        // Información General
        doc.setFontSize(11);
        doc.setFont("Helvetica", "normal");
        doc.text(`Fecha Mantención: ${fecha}`, 14, 32);
        doc.text(`Proveedor Evaluado: ${proveedor}`, 14, 40);
        doc.text(`Equipo / Maquinaria: ${equipo}`, 14, 48);
        doc.text(`Técnico Principal: ${tecnico}`, 14, 56);
        doc.text(`Evaluador del Servicio: ${evaluador}`, 14, 64);

        // Bloque de Calificaciones
        doc.setFont("Helvetica", "bold");
        doc.text("Puntajes por Criterio (Escala 1 - 7):", 14, 76);
        doc.setFont("Helvetica", "normal");

        let yRow = 84;
        const preguntasTexto = [
            "P1: Puntualidad",
            "P2: Uso de EPP",
            "P3: Disposición",
            "P4: Orden y limpieza",
            "P5: Entrega de informe",
            "P6: Calidad general del servicio"
        ];

        preguntasTexto.forEach((texto, index) => {
            const nota = document.querySelector(`input[name="p${index + 1}"]:checked`)?.value || 'No evaluado';
            doc.text(`${texto}: ${nota}`, 14, yRow);
            yRow += 8;
        });

        // Promedio Global
        const textoPromedio = document.getElementById('resultado').innerText;
        doc.setFont("Helvetica", "bold");
        doc.text(`Cierre de Evaluación -> ${textoPromedio}`, 14, yRow + 6);

        // Observaciones escritas
        doc.text("Observaciones del Inspector:", 14, yRow + 18);
        doc.setFont("Helvetica", "normal");
        doc.text(observaciones, 14, yRow + 26, { maxWidth: 180 });

        // Adjuntar firma como imagen PNG si el canvas no está vacío
        if (!signaturePad.isEmpty()) {
            const imgData = signaturePad.toDataURL('image/png');
            doc.setFont("Helvetica", "bold");
            doc.text("Firma de Conformidad:", 14, yRow + 50);
            doc.addImage(imgData, 'PNG', 14, yRow + 56, 60, 25);
        }

        // Descarga automatizada
        doc.save(`Evaluacion_${proveedor.replace(/\s+/g, '_')}_${fecha}.pdf`);
    }
</script>

</body>
</html>
