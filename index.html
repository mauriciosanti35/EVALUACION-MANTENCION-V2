<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Evaluación de Proveedores - Access</title>
    <style>
        :root { 
            --bg: #f8fafc; 
            --card: #ffffff; 
            --accent: #1e40af; 
            --text: #0f172a; 
            --gray-light: #f1f5f9;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 15px; 
            margin: 0; 
        }
        .container { max-width: 500px; margin: auto; }
        .card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border: 1px solid #e2e8f0; 
        }
        h2 { 
            font-size: 1.4rem; 
            color: var(--accent); 
            margin-top: 0; 
            border-bottom: 2px solid #e2e8f0; 
            padding-bottom: 10px; 
            text-align: center; 
        }
        label { 
            display: block; 
            margin-top: 18px; 
            font-weight: 700; 
            font-size: 0.9rem; 
            color: #475569; 
        }
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            margin-top: 6px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            font-size: 16px; 
            background-color: #fff;
        }
        .tecnico-block { 
            background: var(--gray-light); 
            padding: 12px; 
            border-radius: 10px; 
            margin-top: 8px; 
            border: 1px solid #e2e8f0; 
        }
        .btn-add { 
            background: #e2e8f0; 
            color: var(--accent); 
            border: none; 
            padding: 10px; 
            border-radius: 6px; 
            font-weight: bold; 
            width: 100%; 
            cursor: pointer; 
            margin-top: 10px; 
        }
        .eval-container { display: flex; justify-content: space-between; gap: 4px; margin-top: 8px; }
        .eval-btn { 
            flex: 1; 
            padding: 12px 0; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            background: white; 
            cursor: pointer; 
            font-weight: bold; 
            text-align: center; 
            transition: all 0.2s; 
        }
        .eval-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-submit { 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 10px; 
            width: 100%; 
            font-size: 1rem; 
            font-weight: bold; 
            margin-top: 30px; 
            cursor: pointer; 
        }
        .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Evaluación de Proveedores</h2>
        <form id="mainForm">
            <label>Fecha de Mantención</label>
            <input type="date" id="fecha" required>

            <label>Proveedor</label>
            <select id="proveedor" required>
                <option value="">Seleccione...</option>
                <option value="ALEJANDRO LABRA">ALEJANDRO LABRA</option>
                <option value="ARIRIMAQ">ARIRIMAQ</option>
                <option value="BASH">BASH</option>
                <option value="BOMBEROS">BOMBEROS</option>
                <option value="BOSQUE ALTO JARDINES">BOSQUE ALTO JARDINES</option>
                <option value="CASTILLO Y CARRANZA">CASTILLO Y CARRANZA</option>
                <option value="CHILEMPACK">CHILEMPACK</option>
                <option value="CIVIL WORKS">CIVIL WORKS</option>
                <option value="CJ SISTEMA">CJ SISTEMA</option>
                <option value="CLAUDIO MUÑOZ">CLAUDIO MUÑOZ</option>
                <option value="DANSEG">DANSEG</option>
                <option value="DONNAIRE">DONNAIRE</option>
                <option value="ECOCAPACITA">ECOCAPACITA</option>
                <option value="ELEMONT">ELEMONT</option>
                <option value="EMMEG">EMMEG</option>
                <option value="ENTRE RADIOS">ENTRE RADIOS</option>
                <option value="FERREL">FERREL</option>
                <option value="HAKEN">HAKEN</option>
                <option value="INGERACK">INGERACK</option>
                <option value="KRAF TEA">KRAF TEA</option>
                <option value="LUREYE">LUREYE</option>
                <option value="MAGNA IV">MAGNA IV</option>
                <option value="PC PARTNERS">PC PARTNERS</option>
                <option value="RENE LOPEZ">RENE LOPEZ</option>
                <option value="RENTAS EL RETIRO">RENTAS EL RETIRO</option>
                <option value="SERVELEV">SERVELEV</option>
                <option value="SIS SEGURIDAD">SIS SEGURIDAD</option>
                <option value="TEK">TEK</option>
                <option value="TEKNICALL">TEKNICALL</option>
                <option value="THUNDER">THUNDER</option>
                <option value="TIRREAU">TIRREAU</option>
                <option value="TRIPLEZETA">TRIPLEZETA</option>
                <option value="OTRO">OTRO / NUEVO</option>
            </select>

            <label>Equipo / Maquinaria Intervenida</label>
            <input type="text" id="equipo" placeholder="Ej: Ascensor Central / Apilador" required>

            <label>Personal Técnico</label>
            <div id="contenedorTecnicos">
                <div class="tecnico-block">
                    <input type="text" placeholder="Nombre Técnico Principal" class="t-nombre" required>
                </div>
            </div>
            <button type="button" id="btnAddTecnico" class="btn-add">+ ACOMPAÑANTE (OPCIONAL)</button>

            <div id="evaluacionBloque"></div>

            <label>Comentarios / Observaciones</label>
            <textarea id="comentarios" rows="3" placeholder="Detalles de la entrega, pendientes, etc..."></textarea>

            <label>Evaluador (Nombre Firma)</label>
            <input type="text" id="firma" placeholder="Quién evalúa desde Access" required>

            <button type="submit" class="btn-submit" id="submitBtn">GUARDAR EN RESPALDO</button>
        </form>
    </div>
</div>

<script>
    // REEMPLAZAR AQUÍ la URL obtenida al desplegar el Script de Google Sheets (Paso 2)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycb.../exec"; 

    // Establecer fecha por defecto (hoy)
    document.getElementById('fecha').valueAsDate = new Date();

    // Estructura de las 6 dimensiones acordadas
    const preguntas = [
        { id: 'p1', texto: 'P1: Puntualidad y asistencia' },
        { id: 'p2', texto: 'P2: Uso de EPP completos' },
        { id: 'p3', texto: 'P3: Disposición y actitud' },
        { id: 'p4', texto: 'P4: Orden y limpieza del área' },
        { id: 'p5', texto: 'P5: Entrega de Informe/Certificado' },
        { id: 'p6', texto: 'P6: Calidad del servicio técnico' }
    ];

    const notas = {};
    const container = document.getElementById('evaluacionBloque');

    // Construcción de botones de nota 1 a 7 de forma limpia
    preguntas.forEach((preg) => {
        const lbl = document.createElement('label');
        lbl.innerText = preg.texto;
        container.appendChild(lbl);

        const group = document.createElement('div');
        group.className = 'eval-container';

        for(let i = 1; i <= 7; i++) {
            const b = document.createElement('div');
            b.className = 'eval-btn';
            b.innerText = i;
            b.onclick = () => {
                Array.from(group.children).forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                notas[preg.id] = i;
            };
            group.appendChild(b);
        }
        container.appendChild(group);
    });

    // Permitir agregar un técnico acompañante de manera ordenada
    document.getElementById('btnAddTecnico').onclick = function() {
        const bloques actuales = document.querySelectorAll('.tecnico-block').length;
        if(bloques_actuales < 2) {
            const d = document.createElement('div');
            d.className = 'tecnico-block';
            d.innerHTML = `<input type="text" placeholder="Nombre Técnico Acompañante" class="t-nombre" required>`;
            document.getElementById('contenedorTecnicos').appendChild(d);
            this.style.display = "none"; // Ocultar botón tras agregar el segundo
        }
    };

    // Envío y almacenamiento centralizado
    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();

        if(Object.keys(notas).length < 6) {
            return alert("Por favor, califica los 6 puntos antes de guardar.");
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "GUARDANDO EN EXCEL...";

        const inputsTecnicos = Array.from(document.querySelectorAll('.t-nombre'));
        
        const payload = {
            fecha: document.getElementById('fecha').value,
            proveedor: document.getElementById('proveedor').value,
            equipo: document.getElementById('equipo').value,
            tecnico1: inputsTecnicos[0] ? inputsTecnicos[0].value : "",
            tecnico2: inputsTecnicos[1] ? inputsTecnicos[1].value : "", // Pasa limpio a su propia columna
            p1: notas.p1,
            p2: notas.p2,
            p3: notas.p3,
            p4: notas.p4,
            p5: notas.p5,
            p6: notas.p6,
            comentarios: document.getElementById('comentarios').value,
            firma: document.getElementById('firma').value
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            alert("✅ Registro guardado con éxito en el Excel unificado.");
            location.reload();
        } catch (err) {
            console.error(err);
            alert("Error de conexión al guardar el respaldo.");
            btn.disabled = false;
            btn.innerText = "GUARDAR EN RESPALDO";
        }
    };
</script>
</body>
</html>
